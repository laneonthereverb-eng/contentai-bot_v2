version: '3.8'

services:
  bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:alpine
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: contentai
      POSTGRES_USER: contentai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contentai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: